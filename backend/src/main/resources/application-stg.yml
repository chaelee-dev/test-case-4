spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/conduit_stg}
    username: ${DB_USER:conduit_stg}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migrations

logging:
  level:
    root: INFO
    com.conduit: INFO

conduit:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://stg.example.com}
  jwt:
    secret: ${JWT_SECRET}
    expiration-hours: ${JWT_EXPIRATION_HOURS:168}
