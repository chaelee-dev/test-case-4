spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/conduit_dev}
    username: ${DB_USER:conduit}
    password: ${DB_PASSWORD:conduit}
  flyway:
    enabled: true
    locations: classpath:db/migrations
    baseline-on-migrate: true

logging:
  level:
    root: INFO
    com.conduit: DEBUG

conduit:
  cors:
    allowed-origins: "*"
  jwt:
    secret: ${JWT_SECRET:dev_only_change_me_64_bytes_min_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
    expiration-hours: ${JWT_EXPIRATION_HOURS:168}
