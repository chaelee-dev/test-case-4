spring:
  datasource:
    url: jdbc:h2:mem:conduit_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/migrations
    baseline-on-migrate: true
    clean-disabled: false
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

logging:
  level:
    root: WARN
    com.conduit: INFO

conduit:
  cors:
    allowed-origins: "*"
  jwt:
    secret: test_secret_change_me_64_bytes_min_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    expiration-hours: 168
