name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build + test backend
        working-directory: backend
        run: ./gradlew --no-daemon clean build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-reports
          path: backend/build/reports

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install + lint + test + build
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm test
          pnpm build

  three-profile-boot-smoke:
    runs-on: ubuntu-latest
    needs: backend-build
    strategy:
      fail-fast: false
      matrix:
        profile: [dev, stg, prod]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: conduit_${{ matrix.profile }}
          POSTGRES_USER: conduit
          POSTGRES_PASSWORD: conduit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U conduit -d conduit_${{ matrix.profile }}"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build jar
        working-directory: backend
        run: ./gradlew --no-daemon bootJar
      - name: Boot ${{ matrix.profile }} + healthcheck
        env:
          SPRING_PROFILES_ACTIVE: ${{ matrix.profile }}
          DB_URL: jdbc:postgresql://localhost:5432/conduit_${{ matrix.profile }}
          DB_USER: conduit
          DB_PASSWORD: conduit
          JWT_SECRET: ci_only_change_me_64_bytes_min_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          CORS_ALLOWED_ORIGINS: "*"
        run: |
          java -jar backend/build/libs/conduit-api-0.1.0.jar &
          PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/health > /dev/null; then
              echo "ready"; break
            fi
            sleep 2
          done
          curl -sf http://localhost:8080/api/health | tee /tmp/health.json | grep -q '"status":"ok"'
          kill $PID || true

  contract-tests:
    runs-on: ubuntu-latest
    needs: backend-build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: conduit_dev
          POSTGRES_USER: conduit
          POSTGRES_PASSWORD: conduit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U conduit -d conduit_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install bruno CLI
        run: npm install -g @usebruno/cli
      - name: Boot backend
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: dev
          DB_URL: jdbc:postgresql://localhost:5432/conduit_dev
          DB_USER: conduit
          DB_PASSWORD: conduit
          JWT_SECRET: ci_only_change_me_64_bytes_min_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
        run: |
          ./gradlew --no-daemon bootRun &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/api/health > /dev/null && break || sleep 2
          done
      - name: Run bruno suite
        working-directory: specs/api/bruno
        run: bru run --env dev
